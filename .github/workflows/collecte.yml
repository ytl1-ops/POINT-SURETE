name: Collecte POINT SÛRETÉ

on:
  schedule:
    - cron: '5,35 * * * *'      # toutes les 30 min (UTC = heure d'Abidjan)
  workflow_dispatch:
    inputs:
      profondeur:
        description: 'Profondeur de collecte'
        type: choice
        options: [profond, standard, rapide]
        default: profond

permissions:
  contents: write               # nécessaire pour committer data/latest.json

concurrency:
  group: collecte
  cancel-in-progress: false

jobs:
  collecte:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --omit=dev

      - name: Collecter et qualifier
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PROFONDEUR: ${{ inputs.profondeur || 'profond' }}
        run: npm run collecte

      - name: Publier les données
        run: |
          git config user.name  "point-surete-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/latest.json data/zones.json
          git diff --staged --quiet || git commit -m "Collecte $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
